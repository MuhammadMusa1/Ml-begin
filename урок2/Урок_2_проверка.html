<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка по уроку 2 — Данные, Pandas, NumPy</title>
<style>
  :root{
    --bg:#1E1B4B; --bg2:#2E2A6B; --violet:#6D5DF6; --electric:#22D3EE;
    --ink:#1F2937; --muted:#6B7280; --light:#F5F4FF; --line:#E5E3F5;
    --ok:#1D9E75; --okbg:#E1F5EE; --bad:#E24B4A; --badbg:#FCEBEB; --card:#FFFFFF;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#F3F2FB;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;padding:0 0 60px}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px}
  header{background:var(--bg);color:#fff;padding:30px 0 26px;margin-bottom:24px;border-radius:0 0 22px 22px}
  h1{margin:0 0 6px;font-size:25px;font-weight:700}
  .sub{color:#C7C4F0;font-size:15px;margin:0}
  .meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .chip{background:var(--bg2);color:#E6E4FB;font-size:13px;padding:5px 12px;border-radius:20px}
  .progress-bar{height:6px;background:var(--bg2);border-radius:4px;margin-top:16px;overflow:hidden}
  .progress-fill{height:100%;width:0;background:var(--electric);transition:width .3s}
  .section-label{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--violet);margin:26px 0 12px}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:20px 22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(30,27,75,.05)}
  .q-num{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;
    background:var(--violet);color:#fff;border-radius:7px;font-size:13px;font-weight:700;margin-right:10px}
  .q-head{display:flex;align-items:flex-start;margin-bottom:6px}
  .q-text{font-size:16px;font-weight:600;flex:1;padding-top:2px}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;margin-left:8px;white-space:nowrap;
    background:#EEF;color:var(--violet)}
  pre{background:#1E1B4B;color:#E6E4FB;border-radius:10px;padding:14px 16px;overflow-x:auto;
    font-size:14px;line-height:1.5;margin:12px 0;font-family:"SF Mono",Consolas,Monaco,monospace}
  .opts{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:center;gap:11px;padding:11px 14px;border:1.5px solid var(--line);
    border-radius:10px;cursor:pointer;font-size:15px;transition:.15s;background:#fff}
  .opt:hover{border-color:var(--violet);background:var(--light)}
  .opt input{width:18px;height:18px;accent-color:var(--violet);cursor:pointer;flex-shrink:0}
  .opt code{background:#F1EFE8;padding:1px 6px;border-radius:5px;font-size:14px}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt.locked{cursor:default;pointer-events:none}
  .feedback{margin-top:12px;padding:11px 14px;border-radius:10px;font-size:14px;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--okbg);color:#0F6E56}
  .feedback.no{background:var(--badbg);color:#A32D2D}
  .feedback b{font-weight:700}
  textarea{width:100%;min-height:90px;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;
    font-size:14px;font-family:"SF Mono",Consolas,Monaco,monospace;resize:vertical;margin-top:10px;background:#FAFAFE}
  textarea:focus{outline:none;border-color:var(--violet)}
  .reveal-btn{margin-top:10px;background:var(--bg);color:#fff;border:none;padding:9px 18px;border-radius:9px;
    font-size:14px;font-weight:600;cursor:pointer}
  .reveal-btn:hover{background:var(--violet)}
  .solution{margin-top:12px;display:none}
  .solution.show{display:block}
  .solution h4{margin:0 0 6px;font-size:14px;color:var(--ok)}
  .check-btn{display:block;width:100%;background:var(--violet);color:#fff;border:none;padding:15px;
    border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin:24px 0 0}
  .check-btn:hover{background:#5848e0}
  .check-btn:disabled{background:#B4B2C9;cursor:not-allowed}
  .result{background:var(--bg);color:#fff;border-radius:16px;padding:28px 26px;margin-top:24px;text-align:center;display:none}
  .result.show{display:block}
  .score-num{font-size:50px;font-weight:800;line-height:1}
  .score-lbl{color:#C7C4F0;font-size:15px;margin-top:6px}
  .verdict{font-size:20px;font-weight:700;margin-top:16px}
  .verdict-sub{color:#C7C4F0;font-size:14px;margin-top:8px;line-height:1.6}
  .retry{margin-top:18px;background:transparent;color:var(--electric);border:1.5px solid var(--electric);
    padding:10px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
  .retry:hover{background:rgba(34,211,238,.12)}
  .note{font-size:13px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Проверка по уроку 2</h1>
    <p class="sub">Данные · Pandas · NumPy — закрепим, что запомнили</p>
    <div class="meta">
      <span class="chip">8 вопросов</span>
      <span class="chip">3 задачи</span>
      <span class="chip">~10 минут</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
  </div>
</header>

<div class="wrap">
  <div class="section-label">Часть 1 · Тест</div>
  <div id="quiz"></div>
  <button class="check-btn" id="checkBtn">Проверить тест</button>

  <div class="result" id="result">
    <div class="score-num" id="scoreNum">0 / 8</div>
    <div class="score-lbl">правильных ответов</div>
    <div class="verdict" id="verdict"></div>
    <div class="verdict-sub" id="verdictSub"></div>
    <button class="retry" id="retryBtn">Пройти заново</button>
  </div>

  <div class="section-label">Часть 2 · Мини-задачи</div>
  <p class="note">Реши в окне, потом нажми «Показать решение» и сравни.</p>
  <div id="tasks"></div>
</div>

<script>
const QUESTIONS = [
  {
    text:"Как называется один объект в таблице данных — например, один пассажир или одна игра?",
    opts:["Признак (feature)","Наблюдение (строка)","Target","Столбец"], correct:1,
    why:"Один объект — это наблюдение, оно занимает одну строку таблицы. Столбец — это признак."
  },
  {
    text:"Что такое target (целевая переменная)?",
    opts:["Любой столбец таблицы","То, что мы хотим предсказать","Количество строк","Название датасета"],
    correct:1,
    why:"Target — это тот столбец, который модель учится предсказывать (например, выжил/не выжил)."
  },
  {
    text:"Какой из признаков — категориальный (а не числовой)?",
    opts:["Возраст","Цена","Жанр фильма","Рейтинг"], correct:2,
    why:"Жанр — это ярлык/категория. Возраст, цена и рейтинг — числа, которые можно измерить и сравнить."
  },
  {
    text:"Что делает команда df.shape?",
    opts:["Показывает первые 5 строк","Показывает (число строк, число столбцов)","Считает среднее","Загружает таблицу"],
    correct:1,
    why:"shape возвращает размер таблицы: сколько строк (наблюдений) и сколько столбцов (признаков)."
  },
  {
    text:"Чем удобен Pandas? Выбери самое точное описание.",
    opts:["Это «Excel внутри Python» для работы с таблицами","Это редактор кода","Это сайт с датасетами","Это нейросеть"],
    correct:0,
    why:"Pandas — библиотека для таблиц, по духу как Excel, но внутри Python. Главный объект — DataFrame (df)."
  },
  {
    text:"Сколько строк покажет df.head() по умолчанию?",
    opts:["1","5","10","Все"], correct:1,
    why:"head() по умолчанию показывает первые 5 строк — чтобы быстро взглянуть на данные."
  },
  {
    text:"Что выведет этот код?",
    code:"import numpy as np\na = np.array([2, 4, 6])\nprint(a + 1)",
    opts:["[2, 4, 6, 1]","[3, 5, 7]","[2, 4, 7]","Ошибка"], correct:1,
    why:"NumPy применяет операцию ко ВСЕМ числам сразу: к каждому прибавляется 1 → [3, 5, 7]."
  },
  {
    text:"Зачем в ML нужен NumPy?",
    opts:["Рисует графики","Быстро считает сразу со всем списком чисел; на нём построены нейросети",
      "Открывает CSV-файлы","Подключает интернет"],
    correct:1,
    why:"NumPy — «супер-калькулятор» для массивов чисел. Все ML-библиотеки и нейросети работают на нём."
  }
];

const TASKS = [
  {
    type:"Pandas",
    text:"Напиши команды, которые: (1) подключают pandas, (2) загружают таблицу из переменной url в df, (3) показывают её размер.",
    placeholder:"# твой код",
    solution:'import pandas as pd\ndf = pd.read_csv(url)\nprint(df.shape)'
  },
  {
    type:"NumPy",
    text:"Дан массив оценок. Выведи средний балл и прибавь каждому 1 балл одной строкой.",
    given:'import numpy as np\ngrades = np.array([3, 4, 5, 2, 4])',
    placeholder:"# твой код",
    solution:'print(grades.mean())   # 3.6\nprint(grades + 1)      # [4 5 6 3 5]'
  },
  {
    type:"Предсказать вывод",
    text:"Не запуская, напиши что выведет код и почему.",
    given:'import numpy as np\nx = np.array([10, 20, 30])\nprint(x.max() - x.min())',
    placeholder:"Выведет: ...\nПотому что: ...",
    solution:'Выведет: 20\n\nПочему: max() = 30 (самое большое), min() = 10 (самое маленькое).\n30 - 10 = 20. Это размах значений в массиве.'
  }
];

const quiz=document.getElementById('quiz');
QUESTIONS.forEach((q,qi)=>{
  let h='<div class="q" id="q'+qi+'"><div class="q-head"><span class="q-num">'+(qi+1)+'</span>';
  h+='<span class="q-text">'+q.text+'</span></div>';
  if(q.code) h+='<pre>'+esc(q.code)+'</pre>';
  h+='<div class="opts">';
  q.opts.forEach((o,oi)=>{ h+='<label class="opt" data-q="'+qi+'" data-o="'+oi+'">'+
    '<input type="radio" name="q'+qi+'" value="'+oi+'"><span>'+fmt(o)+'</span></label>'; });
  h+='</div><div class="feedback" id="fb'+qi+'"></div></div>';
  quiz.insertAdjacentHTML('beforeend',h);
});

const tasks=document.getElementById('tasks');
TASKS.forEach((t,ti)=>{
  let h='<div class="q"><div class="q-head"><span class="q-num">'+(ti+1)+'</span>'+
    '<span class="q-text">'+t.text+'</span><span class="tag">'+t.type+'</span></div>';
  if(t.given) h+='<pre>'+esc(t.given)+'</pre>';
  h+='<textarea placeholder="'+t.placeholder+'"></textarea>';
  h+='<button class="reveal-btn" data-t="'+ti+'">Показать решение</button>';
  h+='<div class="solution" id="sol'+ti+'"><h4>Образец решения</h4><pre>'+esc(t.solution)+'</pre></div></div>';
  tasks.insertAdjacentHTML('beforeend',h);
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){
  if(/^\[|df\.|np\.|head|shape|==|\(feature\)/.test(s) && !/Любой|Это|Показывает|Считает|Загружает|Рисует|Открывает|Подключает|Количество|Название|То, что|Признак \(f|Наблюдение/.test(s))
    return '<code>'+esc(s)+'</code>';
  return esc(s);
}

function updateProgress(){
  let a=0; QUESTIONS.forEach((q,qi)=>{ if(document.querySelector('input[name="q'+qi+'"]:checked')) a++; });
  document.getElementById('pfill').style.width=(a/QUESTIONS.length*100)+'%';
}
quiz.addEventListener('change',updateProgress);

tasks.addEventListener('click',e=>{
  if(e.target.classList.contains('reveal-btn')){
    const ti=e.target.dataset.t, sol=document.getElementById('sol'+ti);
    sol.classList.toggle('show');
    e.target.textContent=sol.classList.contains('show')?'Скрыть решение':'Показать решение';
  }
});

document.getElementById('checkBtn').addEventListener('click',()=>{
  let score=0;
  QUESTIONS.forEach((q,qi)=>{
    const chosen=document.querySelector('input[name="q'+qi+'"]:checked');
    const fb=document.getElementById('fb'+qi);
    document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(l=>l.classList.add('locked'));
    document.querySelector('.opt[data-q="'+qi+'"][data-o="'+q.correct+'"]').classList.add('correct');
    if(chosen){
      const ci=parseInt(chosen.value);
      if(ci===q.correct){ score++; fb.className='feedback ok show'; fb.innerHTML='<b>Верно!</b> '+q.why; }
      else{ document.querySelector('.opt[data-q="'+qi+'"][data-o="'+ci+'"]').classList.add('wrong');
        fb.className='feedback no show'; fb.innerHTML='<b>Не совсем.</b> '+q.why; }
    } else { fb.className='feedback no show'; fb.innerHTML='<b>Нет ответа.</b> '+q.why; }
  });
  document.getElementById('scoreNum').textContent=score+' / 8';
  let v,vs;
  if(score>=7){v='Отлично усвоил тему!';vs='Ты уверенно понимаешь данные, Pandas и NumPy. Готов двигаться дальше.';}
  else if(score>=5){v='Хорошо!';vs='Основное понятно, пара моментов — повтори по слайдам урока.';}
  else if(score>=3){v='Неплохое начало';vs='Главное уловил. Пройди ещё раз ноутбук урока — и всё уляжется.';}
  else{v='Стоит повторить';vs='Это нормально для второго урока. Открой ноутбук и пройди команды заново — спокойно разберёмся.';}
  document.getElementById('verdict').textContent=v;
  document.getElementById('verdictSub').textContent=vs;
  document.getElementById('result').classList.add('show');
  document.getElementById('checkBtn').disabled=true;
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'center'});
});

document.getElementById('retryBtn').addEventListener('click',()=>{
  QUESTIONS.forEach((q,qi)=>{
    document.querySelectorAll('.opt[data-q="'+qi+'"]').forEach(l=>l.classList.remove('locked','correct','wrong'));
    const c=document.querySelector('input[name="q'+qi+'"]:checked'); if(c)c.checked=false;
    document.getElementById('fb'+qi).className='feedback';
  });
  document.getElementById('result').classList.remove('show');
  document.getElementById('checkBtn').disabled=false;
  updateProgress(); window.scrollTo({top:0,behavior:'smooth'});
});
</script>
</body>
</html>
